<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">   
    <title>Projeto login</title>
    <link rel="stylesheet" href="estilo/style.css">
    
</head>
<body>
    <section class="conteiner">    

            <form action="" method="post" class="form_login" >
                <h1>Login</h1>
                <div class="input-login">
                    <input type="text" name="" id="texto"  placeholder="Username"     autocomplete="username" required>
                    <p class="erro" style="color: white;"></p>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-login">
                    <input type="password" name="" id="senha" placeholder="Password" autocomplete="current-password" required>
                    <i class="fa-solid fa-eye openeyes" data-target="senha"></i>
                </div>
                <span class="aviso"></span>
                <div class="lembrar-senha">
                    <div class="left">
                        <input type="checkbox" name="" id="icheckbox">
                        <label for="icheckbox">Remember me</label>
                    </div>
                    <a href="#" class="register-link" id="forget_password">forgot password?</a>
                </div>
                <button type="submit" class="login but" id="button_login">Login</button>
                <div class="register-link">
                    <p>Don't have an account? <a href="#" id="btn_register"><strong>Register</strong></a></p>
                </div>
            </form>

            <!--Register-->

            <form action="" method="post"  class="form_register">
                <h1>Register</h1>
                <div class="input-register">
                    <input type="text" name="" id="usu"  placeholder="Name"     autocomplete="username" required>
                    <p class="erro" style="color: white;"></p>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-register">
                    <input type="text" name="" id="email" placeholder="Email" autocomplete="email" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="input-register">
                    <input type="password" name="" id="resenha" placeholder="New Password" autocomplete="new-password" required minlength="8" maxlength="64">
                    <i class="fa-solid fa-eye openeyes" data-target="resenha"></i>
                   
                </div>
                <div class="input-register">
                    <input type="password" name="" id="senhaconfirm" placeholder="Confirm password" autocomplete="new-password" minlength="8" maxlength="64"  required>
                    <i class="fa-solid fa-lock" class="icon"></i>
                    
                </div>         
                
                <div class="termos">
                    <div class="left">
                        <input type="checkbox" name="" id="icheckbox_register">
                        <label for="icheckbox_register">Do you agree with the terms of use?</label>
                    </div>
                </div>
                <button type="submit" class="register but">Register</button>
                <span class="aviso"></span>
                <div class="register-link">
                    <p> have an account? <a href="#" id="btn_login"><strong>Login</strong></a></p>
                </div>
            </form>

            <!-- form  enviar email-->
            <form action="" method="post" class="form_esqueci">
                
                <div class="input-esqueci">
                    <h1>Recuperar a senha</h1>
                    <p style="margin-bottom: 15px;">Digite seu endereço de email</p>
                    <label for="email_recuperar">Email:</label>
                    <input type="email" autocomplete="email" id="email_recuperar">
                </div>
                <span class="aviso"></span>
                <div>
                    <button type="submit" id="esqueci_senha" class="but"> Enviar código</button>
                </div>
            </form>
            
            <!-- form  validar o token-->

            <form action="" method="post" class="form_token">
                <div id="conteiner_inputtoken">
                    <h1>Verificação de código</h1>
                    <p style="margin-bottom: 15px;">Digite o código enviado para seu email</p>
                    <input type="text" autocomplete="Digite o código" id="input_token">
                </div>
                <span class="aviso" id="aviso_id"></span>
                <div>
                    <button type="submit" id="token_enviar" class="but"> Validar código</button>
                </div>
            </form>

            <!-- Redefinir senha-->
            <form action="" method="post" class="form_redifinirsenha">
                <div id="containerr_inputredefinir">
                    <h1>Redefinir senha</h1>
                    <label for="">Nova senha:</label>
                    <input type="password" placeholder="Nova senha" id="nova_senha"  minlength="8" maxlength="64">
                </div>
                <div>
                    <label for="">Confirmar senha:</label>
                    <input type="password" placeholder="Confirmar senha" id="confirmar_senha_redefinir"
                    minlength="8" maxlength="64">
                </div>
                <span class="aviso"></span>
                <div>
                    <button type="submit" id="butredefinir_senha" class="but"> Redefinir senha</button>
                </div>
            </form>



            
            <!-- tela perfil -->
            <section id="conteiner_perfil">
                <div class="dados_perfil">
                    <h1>Bem Vindo <span class="bem_vindo">Diogo</span> 👋</h1>
                    <div>
                        <img src="imagem/fundo-rio.png" alt="Foto de perfil" id="foto_perfil">
                    </div>
                        <p>Nome: <span class="nome_usuario"></span></p>
                        <p>Email: <span class="email_usario">Diogorodrigues14</span></p>
                </div>

                <div class="button_perfil">
                    <button class="but_editar">Editar perfil</button>
                    <button class="but_sair">Sair</button>
                </div>
            </section>
    </section>


    
    <script src="script/script.js"></script>
</body>
</html>
